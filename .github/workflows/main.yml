name: Get Unity Activation File

on:
  workflow_dispatch:   # déclenchement manuel uniquement

jobs:
  activation:
    name: Request Activation File
    runs-on: ubuntu-latest

    steps:
      - name: Request Unity Activation File
        uses: game-ci/unity-request-activation-file@v2
        id: getManualLicenseFile
        with:
          unityVersion: 2022.3.0f1   # ← adapter à sa version Unity

      - name: Upload Activation File
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v${{ steps.getManualLicenseFile.outputs.unityVersion }}.alf
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
